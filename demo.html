<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Minimal RPG Demo</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <nav id="navbar">
    <a href="index.html"><button>Home</button></a>
    <a href="demo.html"><button>Play Demo</button></a>
    <a href="about.html"><button>About</button></a>
  </nav>
  
  <body>
    <div id="game">
      <h1>Minimal RPG Demo, generated by Copilot</h1>

      <div id="hud">
        <div id="player-stats">
          <strong>Player</strong>
          <div>HP: <span id="hp">--</span></div>
          <div>XP: <span id="xp">0</span></div>
          <div>Gold: <span id="gold">0</span></div>
        </div>
        <div id="location">Location: <span id="loc">Town</span></div>
      </div>

      <div id="viewport">
        <p id="text">Welcome, adventurer! Use the buttons below to move around and look for encounters.</p>
      </div>

      <div id="choices"></div>

      <div id="log" aria-live="polite"></div>
    </div>

    <script src="demo.js"></script>
  </body>
</html>
